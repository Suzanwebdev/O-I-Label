name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `.vercel/project.json` is committed so only VERCEL_TOKEN is required.
      # Vercel builds in the cloud using env vars from the Vercel project dashboard.
      - name: Deploy to Vercel (production)
        run: npx --yes vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
