name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' || secrets.VERCEL_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "Triggering production deploy via Deploy Hook…"
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
            exit 0
          fi
          if [ -n "${VERCEL_TOKEN:-}" ]; then
            echo "Deploying with Vercel CLI…"
            npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
            exit 0
          fi
          echo "::error::Deploy secrets missing at runtime."
          exit 1
