<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your O &amp; I Label password</title>
  </head>
  <body style="margin:0;padding:0;background:#f7f5f2;font-family:Georgia,'Times New Roman',serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f5f2;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #e8e2da;border-radius:12px;">
            <tr>
              <td style="padding:32px 28px 8px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#9a8b7a;">
                O &amp; I Label
              </td>
            </tr>
            <tr>
              <td style="padding:8px 28px 12px;font-size:26px;line-height:1.2;color:#1a1a1a;">
                Reset your password
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 20px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#6d6560;">
                We received a request to reset the password for your O &amp; I Label account.
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px;">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block;background:#1a1a1a;color:#ffffff;text-decoration:none;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:600;padding:14px 24px;border-radius:999px;"
                >
                  Choose a new password
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.6;color:#9a8b7a;">
                If you did not request this, you can safely ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
